<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>
  <link rel="stylesheet" href="checkout.css">
</head>
<body>
  
  <div class="checkout-container">
    <h1> Checkout 🛒</h1>

  <div id="orderItems"></div>

  <h2 class="total">Total: ₹<span id="totalPrice">0.00</span></h2>


  <form id="checkoutForm" class="checkout-form">

    <input type="text" id="name" placeholder="Full Name" required>
    <input type="text" id="address" placeholder="Address" required>
    <input type="tel" id="phone" placeholder="Phone Number" required>

    <h3 class="payment-title">Choose Payment Method</h3>
    <div class="payment-options">
      <label class="payment-card active">
        <input type="radio" name="payment" value="cod" checked hidden>
        <span class="icon">💵</span>
        <span>Cash on Delivery</span>
      </label>

      <label class="payment-card">
        <input type="radio" name="payment" value="upi" hidden>
        <span class="icon">📱</span>
        <span>UPI Payment</span>
      </label>

      <label class="payment-card">
        <input type="radio" name="payment" value="card" hidden>
        <span class="icon">💳</span>
        <span>Card</span>
      </label>

    </div>
  </br>

    <button type="submit" class="order-btn">Place Order</button>

  </form>

</div>
  <script src="checkout.js"></script>
</body>
</html>
